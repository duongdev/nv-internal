name: Production Restore

# CRITICAL: This workflow restores production data from backups
# Use with extreme caution - this WILL OVERWRITE existing data
#
# SECURITY: Decrypted data never leaves the job that uses it.
# Each restore job clones, decrypts, and restores in a single runner.
on:
  workflow_dispatch:
    inputs:
      backup_timestamp:
        description: "Backup timestamp folder to restore from (YYYYMMDDHHmmss format, e.g., 20260111143052)"
        required: true
        type: string
      restore_database:
        description: "Restore database"
        required: true
        type: boolean
        default: false
      restore_blobs:
        description: "Restore blob storage"
        required: true
        type: boolean
        default: false
      confirm_restore:
        description: "I understand this will OVERWRITE production data"
        required: true
        type: boolean
        default: false
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

permissions:
  contents: read

jobs:
  # ============================================
  # Job 1: Validate Inputs
  # ============================================
  validate:
    name: Validate Restore Request
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: ${{ !inputs.confirm_restore }}
        run: |
          echo "::error::Restore was NOT confirmed. You must check 'I understand this will OVERWRITE production data' to proceed."
          exit 1

      - name: Validate at least one restore option
        if: ${{ !inputs.restore_database && !inputs.restore_blobs }}
        run: |
          echo "::error::No restore option selected. Select at least one of: restore_database, restore_blobs"
          exit 1

      - name: Validate backup timestamp format
        env:
          BACKUP_TIMESTAMP: ${{ inputs.backup_timestamp }}
        run: |
          if ! [[ "$BACKUP_TIMESTAMP" =~ ^[0-9]{14}$ ]]; then
            echo "::error::Invalid timestamp format. Use YYYYMMDDHHmmss (e.g., 20260111143052)"
            exit 1
          fi
          echo "Backup timestamp: $BACKUP_TIMESTAMP"

      - name: Display restore warning
        env:
          BACKUP_TIMESTAMP: ${{ inputs.backup_timestamp }}
          TARGET_ENV: ${{ inputs.target_environment }}
          RESTORE_DB: ${{ inputs.restore_database }}
          RESTORE_BLOBS: ${{ inputs.restore_blobs }}
        run: |
          echo "::warning::PRODUCTION RESTORE INITIATED"
          echo ""
          echo "========================================"
          echo "  PRODUCTION RESTORE WARNING"
          echo "========================================"
          echo ""
          echo "Target Environment: $TARGET_ENV"
          echo "Backup Timestamp: $BACKUP_TIMESTAMP"
          echo "Restore Database: $RESTORE_DB"
          echo "Restore Blobs: $RESTORE_BLOBS"
          echo ""
          echo "This operation WILL OVERWRITE existing data!"
          echo "========================================"

      - name: Create validation summary
        env:
          BACKUP_TIMESTAMP: ${{ inputs.backup_timestamp }}
          TARGET_ENV: ${{ inputs.target_environment }}
          RESTORE_DB: ${{ inputs.restore_database }}
          RESTORE_BLOBS: ${{ inputs.restore_blobs }}
        run: |
          echo "## Restore Request Validated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target Environment | \`$TARGET_ENV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backup Timestamp | \`$BACKUP_TIMESTAMP\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Restore Database | $RESTORE_DB |" >> $GITHUB_STEP_SUMMARY
          echo "| Restore Blobs | $RESTORE_BLOBS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Warning**: This will OVERWRITE existing data in the target environment." >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: Restore Database (self-contained)
  # Clones backup repo, decrypts, and restores
  # in a single job — no decrypted artifacts
  # ============================================
  restore-database:
    name: Restore Database
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ inputs.restore_database }}
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install PostgreSQL 17 client
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/keyrings/postgresql.gpg
          echo "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH
          /usr/lib/postgresql/17/bin/psql --version

      - name: Install Git LFS and GPG
        run: |
          sudo apt-get install -y git-lfs gnupg

      - name: Clone backup repository
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
        run: |
          git clone "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/${BACKUP_REPO}.git" backup-repo
          cd backup-repo
          git lfs install
          git lfs pull

      - name: Find and decrypt database backup
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_TIMESTAMP: ${{ inputs.backup_timestamp }}
        run: |
          BACKUP_PATH="backup-repo/backups/${BACKUP_TIMESTAMP}"

          if [ ! -d "$BACKUP_PATH" ]; then
            echo "::error::Backup not found for timestamp: ${BACKUP_TIMESTAMP}"
            echo "Available backups:"
            ls backup-repo/backups/ 2>/dev/null || echo "No backups directory found"
            exit 1
          fi

          # Find database backup file
          DB_FILE=$(ls "$BACKUP_PATH"/database-*.sql.gz.gpg 2>/dev/null | head -1)
          if [ -z "$DB_FILE" ]; then
            echo "::error::No database backup found in $BACKUP_PATH"
            ls -la "$BACKUP_PATH/"
            exit 1
          fi

          echo "Found database backup: $DB_FILE"
          mkdir -p decrypted

          # Decrypt
          printf '%s' "$BACKUP_ENCRYPTION_KEY" | gpg \
            --decrypt --batch --yes --passphrase-fd 0 \
            --output "decrypted/database.sql.gz" \
            "$DB_FILE"

          echo "Decrypted successfully"
          ls -la decrypted/

      - name: Display restore warning
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
        run: |
          echo "::warning::DATABASE RESTORE - This will OVERWRITE the ${TARGET_ENV} database!"

      - name: Run database restore
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x scripts/restore-database.sh
          echo "Starting database restore..."
          ./scripts/restore-database.sh "decrypted/database.sql.gz" --confirm

      - name: Verify restore
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Verifying restored database..."
          TABLE_COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" | tr -d ' ')
          echo "Tables in database: $TABLE_COUNT"

          if [ "$TABLE_COUNT" -gt 0 ]; then
            echo "Database restore verification PASSED"
          else
            echo "::warning::Database appears empty after restore"
          fi

      - name: Cleanup sensitive files
        if: always()
        run: rm -rf decrypted/ backup-repo/

      - name: Create restore summary
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
          BACKUP_TIMESTAMP: ${{ inputs.backup_timestamp }}
        run: |
          echo "## Database Restore Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: $TARGET_ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Backup Timestamp**: $BACKUP_TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Success" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 3: Restore Blobs (self-contained)
  # Clones backup repo, decrypts, and restores
  # in a single job — no decrypted artifacts
  # ============================================
  restore-blobs:
    name: Restore Blobs
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ inputs.restore_blobs }}
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Git LFS and GPG
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs gnupg

      - name: Clone backup repository
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
        run: |
          git clone "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/${BACKUP_REPO}.git" backup-repo
          cd backup-repo
          git lfs install
          git lfs pull

      - name: Find and decrypt blobs backup
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_TIMESTAMP: ${{ inputs.backup_timestamp }}
        run: |
          BACKUP_PATH="backup-repo/backups/${BACKUP_TIMESTAMP}"

          if [ ! -d "$BACKUP_PATH" ]; then
            echo "::error::Backup not found for timestamp: ${BACKUP_TIMESTAMP}"
            echo "Available backups:"
            ls backup-repo/backups/ 2>/dev/null || echo "No backups directory found"
            exit 1
          fi

          # Find blobs backup file
          BLOBS_FILE=$(ls "$BACKUP_PATH"/blobs-*.tar.gpg 2>/dev/null | head -1)
          if [ -z "$BLOBS_FILE" ]; then
            echo "::error::No blobs backup found in $BACKUP_PATH"
            ls -la "$BACKUP_PATH/"
            exit 1
          fi

          echo "Found blobs backup: $BLOBS_FILE"
          mkdir -p decrypted

          # Decrypt
          printf '%s' "$BACKUP_ENCRYPTION_KEY" | gpg \
            --decrypt --batch --yes --passphrase-fd 0 \
            --output "decrypted/blobs.tar" \
            "$BLOBS_FILE"

          # Extract tarball
          cd decrypted
          tar -xf blobs.tar
          ls -la blobs/ || echo "No blobs directory after extraction"

      - name: Verify blob backup files
        run: |
          if [ ! -f decrypted/blobs/blobs-manifest.json ]; then
            echo "::error::Manifest file not found in blob backup"
            exit 1
          fi
          echo "Manifest found, proceeding with restore..."
          head -20 decrypted/blobs/blobs-manifest.json

      - name: Run blob restore
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          echo "Starting blob restore..."
          pnpm tsx scripts/restore-blobs.ts --input decrypted/blobs --confirm

      - name: Cleanup sensitive files
        if: always()
        run: rm -rf decrypted/ backup-repo/

      - name: Create restore summary
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
          BACKUP_TIMESTAMP: ${{ inputs.backup_timestamp }}
        run: |
          echo "## Blob Restore Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: $TARGET_ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Backup Timestamp**: $BACKUP_TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Success" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 4: Final Verification
  # ============================================
  verify:
    name: Verify Restore
    runs-on: ubuntu-latest
    needs: [validate, restore-database, restore-blobs]
    if: always()

    steps:
      - name: Check restore results
        env:
          DB_RESULT: ${{ needs.restore-database.result }}
          BLOB_RESULT: ${{ needs.restore-blobs.result }}
          RESTORE_DB: ${{ inputs.restore_database }}
          RESTORE_BLOBS: ${{ inputs.restore_blobs }}
        run: |
          echo "Database restore: $DB_RESULT"
          echo "Blob restore: $BLOB_RESULT"

          # Check if any required restore failed
          if [ "$RESTORE_DB" == "true" ] && [ "$DB_RESULT" == "failure" ]; then
            echo "::error::Database restore FAILED"
            exit 1
          fi

          if [ "$RESTORE_BLOBS" == "true" ] && [ "$BLOB_RESULT" == "failure" ]; then
            echo "::error::Blob restore FAILED"
            exit 1
          fi

          echo "All requested restores completed successfully!"

      - name: Create final summary
        env:
          DB_RESULT: ${{ needs.restore-database.result }}
          BLOB_RESULT: ${{ needs.restore-blobs.result }}
          RESTORE_DB: ${{ inputs.restore_database }}
          RESTORE_BLOBS: ${{ inputs.restore_blobs }}
          TARGET_ENV: ${{ inputs.target_environment }}
          BACKUP_TIMESTAMP: ${{ inputs.backup_timestamp }}
        run: |
          echo "## Production Restore Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "$RESTORE_DB" == "true" ]; then
            if [ "$DB_RESULT" == "success" ]; then
              echo "| Database | Success |" >> $GITHUB_STEP_SUMMARY
            elif [ "$DB_RESULT" == "skipped" ]; then
              echo "| Database | Skipped (not requested or backup not found) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Database | **FAILED** |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Database | Not requested |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$RESTORE_BLOBS" == "true" ]; then
            if [ "$BLOB_RESULT" == "success" ]; then
              echo "| Blobs | Success |" >> $GITHUB_STEP_SUMMARY
            elif [ "$BLOB_RESULT" == "skipped" ]; then
              echo "| Blobs | Skipped (not requested or backup not found) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Blobs | **FAILED** |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Blobs | Not requested |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: $TARGET_ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Backup Timestamp**: $BACKUP_TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "**Completed**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
